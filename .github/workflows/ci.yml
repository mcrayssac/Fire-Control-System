name: FCS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'sbt'

      - name: Compile
        run: sbt compile

      - name: Run Petri Net verification tests
        run: sbt "testOnly fcs.petri.*"

      - name: Run all tests
        run: sbt test

      - name: Run formal verification
        run: sbt "run verify"
